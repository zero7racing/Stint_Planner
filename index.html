<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero7 Racing - Stint Planner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: rgb(10, 12, 15);
    color: rgb(255, 255, 255);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 40px;
  }

  .container {
    width: 100%;
    max-width: 900px;
  }

  /* HEADER */
  header {
    padding: 32px 0 20px;
    text-align: center;
  }
  .logo {
    font-size: 2rem;
    font-weight: 800;
    color: rgb(97, 255, 11);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 1.1rem;
    color: rgb(255, 255, 255);
    margin-top: 4px;
    font-weight: 400;
    letter-spacing: 1px;
  }
  .header-line {
    height: 2px;
    background: rgb(97, 255, 11);
    margin-top: 20px;
    border-radius: 1px;
  }

  /* CARDS */
  .card {
    background: rgb(18, 20, 25);
    border-radius: 8px;
    padding: 24px;
    margin-top: 24px;
  }
  .card-title {
    color: rgb(97, 255, 11);
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  /* FORM GRID */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .form-group.full-width {
    grid-column: 1 / -1;
  }
  label {
    font-size: 0.85rem;
    color: rgb(160, 160, 170);
    font-weight: 500;
  }
  input[type="text"],
  input[type="number"],
  input[type="time"] {
    background: rgb(25, 28, 35);
    border: 1px solid rgb(50, 55, 65);
    border-radius: 6px;
    color: rgb(255, 255, 255);
    font-size: 0.95rem;
    padding: 10px 12px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    min-height: 48px;
  }
  input:focus {
    border-color: rgb(97, 255, 11);
  }
  .field-desc {
    font-size: 0.75rem;
    color: rgb(160, 160, 170);
    margin-top: 2px;
  }

  /* BUTTON */
  .btn-primary {
    background: rgb(97, 255, 11);
    color: #000;
    font-weight: 700;
    font-size: 1rem;
    padding: 14px 32px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    min-height: 48px;
    letter-spacing: 0.5px;
  }
  .btn-primary:hover { background: rgb(120, 255, 50); }
  .btn-primary:active { background: rgb(80, 210, 5); }

  .btn-center {
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }
  .btn-full { width: 100%; }

  /* ERROR */
  .error-msg {
    color: rgb(255, 80, 80);
    font-size: 0.9rem;
    text-align: center;
    margin-top: 10px;
    display: none;
  }
  .error-msg.visible { display: block; }

  /* SCHEDULE SECTION */
  #schedule-section { display: none; }
  #export-section { display: none; }

  .schedule-header { margin-bottom: 6px; }
  .schedule-title {
    color: rgb(97, 255, 11);
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: inline;
  }
  .schedule-event-name {
    color: rgb(255, 255, 255);
    font-size: 1.1rem;
    font-weight: 600;
    margin-left: 8px;
    display: inline;
  }
  .schedule-summary {
    color: rgb(160, 160, 170);
    font-size: 0.85rem;
    margin-top: 6px;
    margin-bottom: 16px;
  }

  /* TABLE WRAPPER */
  .table-wrapper {
    max-height: 500px;
    overflow-y: auto;
    overflow-x: auto;
    border-radius: 6px;
    border: 1px solid rgb(50, 55, 65);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 480px;
  }
  thead th {
    background: rgb(30, 33, 40);
    color: rgb(97, 255, 11);
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 12px 14px;
    text-align: left;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  tbody tr:nth-child(odd)  { background: rgb(18, 20, 25); }
  tbody tr:nth-child(even) { background: rgb(22, 25, 32); }
  tbody tr.short-stint {
    border-left: 3px solid rgb(255, 191, 0);
  }
  td {
    padding: 10px 14px;
    font-size: 0.9rem;
    color: rgb(255, 255, 255);
    vertical-align: middle;
  }
  td.col-num {
    color: rgb(97, 255, 11);
    font-weight: 700;
    width: 48px;
    text-align: center;
  }
  td.col-time { width: 90px; }
  td.col-dur  { width: 110px; }
  td.col-driver { }

  .short-label {
    color: rgb(160, 160, 170);
    font-size: 0.78rem;
    margin-left: 4px;
  }
  .dur-short { color: rgb(255, 191, 0); font-weight: 600; }

  input.driver-input {
    background: transparent;
    border: 1px solid rgb(50, 55, 65);
    border-radius: 4px;
    color: rgb(255, 255, 255);
    font-size: 0.88rem;
    padding: 6px 10px;
    font-family: inherit;
    outline: none;
    width: 100%;
    min-width: 140px;
    transition: border-color 0.2s;
    min-height: 36px;
  }
  input.driver-input:focus { border-color: rgb(97, 255, 11); }

  /* FOOTER */
  footer {
    margin-top: 40px;
    text-align: center;
    width: 100%;
    max-width: 900px;
  }
  .footer-line {
    height: 1px;
    background: rgb(97, 255, 11);
    margin-bottom: 12px;
    border-radius: 1px;
    opacity: 0.4;
  }
  .footer-text {
    color: rgb(160, 160, 170);
    font-size: 0.8rem;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full-width { grid-column: 1; }
    .logo { font-size: 1.5rem; }
    .btn-primary { width: 100%; }
  }

  /* Hidden canvas */
  #export-canvas { display: none; }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="logo">Zero7 Racing</div>
    <div class="subtitle">Stint Planner</div>
    <div class="header-line"></div>
  </header>

  <!-- SECTION 1: EVENT SETUP -->
  <div class="card">
    <div class="card-title">Event Setup</div>
    <div class="form-grid">
      <div class="form-group full-width">
        <label for="event-name">Event Name</label>
        <input type="text" id="event-name" placeholder="e.g. 24h Le Mans" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="race-start">Race Start Time (UTC or local)</label>
        <input type="time" id="race-start" value="13:00">
      </div>
      <div class="form-group">
        <label for="race-duration">Race Duration (hours)</label>
        <input type="number" id="race-duration" placeholder="e.g. 6, 12, 24" min="1" max="48">
      </div>
      <div class="form-group">
        <label for="stint-duration">Stint Duration (minutes)</label>
        <input type="number" id="stint-duration" placeholder="e.g. 52" min="1" max="300">
        <span class="field-desc">Max stint length with full fuel load</span>
      </div>
      <div class="form-group">
        <label for="pit-time">Pit Stop Time (minutes)</label>
        <input type="number" id="pit-time" placeholder="e.g. 3" min="0" max="30">
        <span class="field-desc">Average time lost in pit lane (fuel + tires)</span>
      </div>
    </div>
    <div class="btn-center">
      <button class="btn-primary" id="generate-btn" onclick="generatePlan()">Generate Stint Plan</button>
    </div>
    <div class="error-msg" id="error-msg">Please fill in all fields with valid values.</div>
  </div>

  <!-- SECTION 2: STINT TABLE -->
  <div class="card" id="schedule-section">
    <div class="schedule-header">
      <span class="schedule-title">Stint Schedule</span>
      <span class="schedule-event-name" id="schedule-event-name"></span>
    </div>
    <div class="schedule-summary" id="schedule-summary"></div>
    <div class="table-wrapper">
      <table id="stint-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Start</th>
            <th>End</th>
            <th>Duration</th>
            <th>Driver</th>
          </tr>
        </thead>
        <tbody id="stint-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- SECTION 3: EXPORT -->
  <div class="card" id="export-section">
    <div class="btn-center">
      <button class="btn-primary" onclick="downloadImage()">Download as Image</button>
    </div>
  </div>

</div><!-- /container -->

<!-- FOOTER -->
<footer>
  <div class="footer-line"></div>
  <div class="footer-text">Zero7 Racing - Stint Planner</div>
</footer>

<!-- Hidden canvas for export -->
<canvas id="export-canvas"></canvas>

<script>
// ─── Helpers ────────────────────────────────────────────────────────────────

function parseTime(str) {
  // "HH:MM" -> total minutes from midnight
  const [h, m] = str.split(':').map(Number);
  return h * 60 + m;
}

function formatTime(totalMin) {
  // Wrap to 24h, return { time: "HH:MM", day: 0|1|2 }
  const day = Math.floor(totalMin / (24 * 60));
  const mins = ((totalMin % (24 * 60)) + (24 * 60)) % (24 * 60);
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return {
    time: String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0'),
    day
  };
}

function formatTimeStr(totalMin, baseDay) {
  const f = formatTime(totalMin);
  let suffix = '';
  if (f.day > baseDay) suffix = ' +' + (f.day - baseDay) + 'd';
  return f.time + suffix;
}

// ─── Calculation ─────────────────────────────────────────────────────────────

function generateStints(startTimeStr, raceDurationHours, stintDurationMin, pitTimeMin) {
  const stints = [];
  const raceStartMin = parseTime(startTimeStr);
  const raceEndMin = raceStartMin + raceDurationHours * 60;
  const baseDay = Math.floor(raceStartMin / (24 * 60));

  let currentMin = raceStartMin;
  let stintNumber = 1;

  while (currentMin < raceEndMin) {
    const stintStart = currentMin;
    let stintEnd = currentMin + stintDurationMin;
    let isShort = false;

    if (stintEnd > raceEndMin) {
      stintEnd = raceEndMin;
      isShort = true;
    }

    const actualDuration = stintEnd - stintStart;

    stints.push({
      number: stintNumber,
      startStr: formatTimeStr(stintStart, baseDay),
      endStr:   formatTimeStr(stintEnd,   baseDay),
      durationMin: actualDuration,
      isShort,
      driver: ''
    });

    stintNumber++;

    if (stintEnd < raceEndMin) {
      currentMin = stintEnd + pitTimeMin;
    } else {
      break;
    }
  }

  return stints;
}

// ─── State ───────────────────────────────────────────────────────────────────

let currentStints = [];
let currentConfig = {};

// ─── Generate Plan ────────────────────────────────────────────────────────────

function generatePlan() {
  const eventName    = document.getElementById('event-name').value.trim();
  const raceStart    = document.getElementById('race-start').value.trim();
  const raceDuration = parseFloat(document.getElementById('race-duration').value);
  const stintDur     = parseFloat(document.getElementById('stint-duration').value);
  const pitTime      = parseFloat(document.getElementById('pit-time').value);

  const errEl = document.getElementById('error-msg');

  if (!eventName || !raceStart || isNaN(raceDuration) || isNaN(stintDur) || isNaN(pitTime) ||
      raceDuration < 1 || raceDuration > 48 || stintDur < 1 || stintDur > 300 || pitTime < 0 || pitTime > 30) {
    errEl.classList.add('visible');
    return;
  }
  errEl.classList.remove('visible');

  currentConfig = { eventName, raceStart, raceDuration, stintDur, pitTime };
  currentStints = generateStints(raceStart, raceDuration, stintDur, pitTime);

  renderTable();
}

// ─── Render Table ─────────────────────────────────────────────────────────────

function renderTable() {
  const { eventName, raceStart, raceDuration, stintDur, pitTime } = currentConfig;

  document.getElementById('schedule-event-name').textContent = '- ' + eventName;
  document.getElementById('schedule-summary').textContent =
    `${eventName} - ${raceDuration}h race starting at ${raceStart} | Stint: ${stintDur}min | Pit: ${pitTime}min`;

  const tbody = document.getElementById('stint-tbody');
  tbody.innerHTML = '';

  currentStints.forEach((s, idx) => {
    const tr = document.createElement('tr');
    if (s.isShort) tr.classList.add('short-stint');

    const durText = s.isShort
      ? `<span class="dur-short">${s.durationMin}min</span><span class="short-label">(short)</span>`
      : `${s.durationMin}min`;

    tr.innerHTML = `
      <td class="col-num">${s.number}</td>
      <td class="col-time">${s.startStr}</td>
      <td class="col-time">${s.endStr}</td>
      <td class="col-dur">${durText}</td>
      <td class="col-driver"><input class="driver-input" type="text" placeholder="Driver name" data-idx="${idx}" value="${s.driver}"></td>
    `;
    tbody.appendChild(tr);
  });

  // Listen for driver name changes
  tbody.querySelectorAll('input.driver-input').forEach(inp => {
    inp.addEventListener('input', e => {
      currentStints[parseInt(e.target.dataset.idx)].driver = e.target.value;
    });
  });

  document.getElementById('schedule-section').style.display = 'block';
  document.getElementById('export-section').style.display = 'block';
  document.getElementById('schedule-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── Canvas Image Export ──────────────────────────────────────────────────────

function downloadImage() {
  const { eventName, raceStart, raceDuration, stintDur, pitTime } = currentConfig;
  const stints = currentStints;

  const W = 900;
  const PAD = 40;
  const ROW_H = 34;
  const HEADER_H = 36;

  // Title block height
  const TITLE_H = 110; // ZERO7 + event + summary + line
  const FOOTER_H = 50;

  const totalH = PAD + TITLE_H + HEADER_H + stints.length * ROW_H + FOOTER_H + PAD;

  const canvas = document.getElementById('export-canvas');
  canvas.width  = W;
  canvas.height = totalH;
  const ctx = canvas.getContext('2d');

  const BG      = 'rgb(10, 12, 15)';
  const ACCENT  = 'rgb(97, 255, 11)';
  const WHITE   = 'rgb(255, 255, 255)';
  const MUTED   = 'rgb(160, 160, 170)';
  const AMBER   = 'rgb(255, 191, 0)';
  const ROW1    = 'rgb(18, 20, 25)';
  const ROW2    = 'rgb(22, 25, 32)';
  const HEAD_BG = 'rgb(30, 33, 40)';

  // Background
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, totalH);

  let y = PAD;

  // ── Title block ──
  ctx.fillStyle = ACCENT;
  ctx.font = 'bold 28px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  ctx.fillText('ZERO7 RACING', PAD, y + 28);
  y += 38;

  ctx.fillStyle = WHITE;
  ctx.font = 'bold 22px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  ctx.fillText(eventName, PAD, y + 22);
  y += 32;

  ctx.fillStyle = MUTED;
  ctx.font = '14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  ctx.fillText(`${raceDuration}h race | Stint: ${stintDur}min | Pit: ${pitTime}min | Start: ${raceStart}`, PAD, y + 14);
  y += 24;

  // Separator line
  ctx.fillStyle = ACCENT;
  ctx.fillRect(PAD, y, W - PAD * 2, 1);
  y += 14;

  // ── Column layout ──
  const cols = [
    { label: '#',        x: PAD,       w: 50  },
    { label: 'START',    x: PAD + 50,  w: 120 },
    { label: 'END',      x: PAD + 170, w: 120 },
    { label: 'DURATION', x: PAD + 290, w: 120 },
    { label: 'DRIVER',   x: PAD + 410, w: W - PAD - PAD - 410 },
  ];

  // ── Table header ──
  ctx.fillStyle = HEAD_BG;
  ctx.fillRect(PAD, y, W - PAD * 2, HEADER_H);

  ctx.fillStyle = ACCENT;
  ctx.font = 'bold 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  cols.forEach(c => {
    ctx.fillText(c.label, c.x + 8, y + 23);
  });
  y += HEADER_H;

  // ── Table rows ──
  stints.forEach((s, i) => {
    ctx.fillStyle = i % 2 === 0 ? ROW1 : ROW2;
    ctx.fillRect(PAD, y, W - PAD * 2, ROW_H);

    // Short stint left border
    if (s.isShort) {
      ctx.fillStyle = AMBER;
      ctx.fillRect(PAD, y, 3, ROW_H);
    }

    const cy = y + ROW_H / 2 + 5;

    // # column
    ctx.fillStyle = ACCENT;
    ctx.font = 'bold 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
    ctx.fillText(String(s.number), cols[0].x + 8, cy);

    // Start, End
    ctx.fillStyle = WHITE;
    ctx.font = '14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
    ctx.fillText(s.startStr, cols[1].x + 8, cy);
    ctx.fillText(s.endStr,   cols[2].x + 8, cy);

    // Duration
    if (s.isShort) {
      ctx.fillStyle = AMBER;
      ctx.font = 'bold 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
      ctx.fillText(s.durationMin + 'min', cols[3].x + 8, cy);
      const mw = ctx.measureText(s.durationMin + 'min').width;
      ctx.fillStyle = MUTED;
      ctx.font = '12px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
      ctx.fillText(' (short)', cols[3].x + 8 + mw, cy);
    } else {
      ctx.fillStyle = WHITE;
      ctx.font = '14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
      ctx.fillText(s.durationMin + 'min', cols[3].x + 8, cy);
    }

    // Driver
    ctx.fillStyle = s.driver ? WHITE : MUTED;
    ctx.font = '14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
    ctx.fillText(s.driver || '-', cols[4].x + 8, cy);

    y += ROW_H;
  });

  // ── Footer ──
  y += 20;
  ctx.fillStyle = ACCENT;
  ctx.globalAlpha = 0.4;
  ctx.fillRect(PAD, y, W - PAD * 2, 1);
  ctx.globalAlpha = 1.0;
  y += 14;

  ctx.fillStyle = MUTED;
  ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  const footerText = 'Stint plan by Zero7 Racing';
  const tw = ctx.measureText(footerText).width;
  ctx.fillText(footerText, (W - tw) / 2, y + 11);

  // ── Trigger download ──
  const link = document.createElement('a');
  const filename = eventName.toLowerCase().replace(/\s+/g, '_') + '_stint_plan.png';
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>

</body>
</html>
